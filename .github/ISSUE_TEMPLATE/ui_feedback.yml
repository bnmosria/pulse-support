name: UI Feedback
description: Something looks wrong or feels off visually
labels: ["ui", "design"]
body:
  - type: markdown
    attributes:
      value: |
        Visual issues, layout problems, or anything that doesn't feel right on screen. Screenshots are especially helpful here.

  - type: textarea
    id: description
    attributes:
      label: What looks or feels wrong?
      placeholder: The pause button on the timer screen is too small to tap accurately with one hand mid-workout.
    validations:
      required: true

  - type: dropdown
    id: screen
    attributes:
      label: Which screen?
      options:
        - Splash
        - Home
        - Templates
        - Builder
        - Timer
        - Summary
        - History
        - Settings
        - Multiple screens
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device and screen size
      placeholder: iPhone SE (small screen), iPhone 15 Pro Max (large screen)
    validations:
      required: false

  - type: textarea
    id: suggestion
    attributes:
      label: What would feel better?
      description: If you have a suggestion for how to fix it, describe it here.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag and drop images or screen recordings here.
    validations:
      required: false
