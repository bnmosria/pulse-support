name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Pulse better? Describe what you need and why it matters.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this feature would help.
      placeholder: When I do circuit training with 5+ exercises, I lose track of which exercise is next during the rest phase.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: What should the feature do? How should it work?
      placeholder: The rest phase should show the name of the next exercise in large text so I can prepare.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Any other ways you have worked around this or other approaches that might work.
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use regularly
        - Blocking me from using the app
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, references to other apps, or any other context.
    validations:
      required: false
