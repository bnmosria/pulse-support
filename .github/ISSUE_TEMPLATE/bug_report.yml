name: Bug Report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster it can be fixed.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I tap Start on the Home screen, the timer starts but the background colour does not change to orange.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: The background should change to the PREPARE phase orange colour.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Tap ▶ Start on the Home screen
        3. Observe the timer screen
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device and OS version
      placeholder: iPhone 15 Pro, iOS 17.4
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: v1.0.0
    validations:
      required: false

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Always
        - Sometimes
        - Rarely — hard to reproduce
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or any other relevant information.
    validations:
      required: false
